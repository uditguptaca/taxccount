<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taxccount — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .offline-container { text-align: center; max-width: 420px; }
    .offline-icon { width: 80px; height: 80px; background: #1e293b; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 24px; }
    .offline-icon svg { color: #60a5fa; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #94a3b8; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    .offline-actions { display: flex; flex-direction: column; gap: 12px; }
    .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
    .btn-ghost:hover { background: #1e293b; color: #e2e8f0; }
    .capture-area { margin-top: 32px; padding: 24px; border: 2px dashed #334155; border-radius: 12px; display: none; }
    .capture-area.active { display: block; }
    .capture-area h3 { font-size: 16px; margin-bottom: 12px; }
    .queued-files { margin-top: 16px; text-align: left; }
    .queued-file { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #1e293b; border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
    .queued-file .status { margin-left: auto; color: #fbbf24; font-size: 12px; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. You can still capture documents — they'll be automatically uploaded when you're back online.</p>
    
    <div class="offline-actions">
      <button class="btn btn-primary" onclick="showCapture()">📷 Capture Document</button>
      <button class="btn btn-ghost" onclick="location.reload()">🔄 Try Again</button>
    </div>

    <div class="capture-area" id="captureArea">
      <h3>📎 Offline Document Capture</h3>
      <p style="font-size: 13px;">Select files to queue. They will sync automatically when your connection returns.</p>
      <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()" style="width: 100%;">
        Select Files / Take Photo
      </button>
      <input type="file" id="fileInput" accept="image/*,.pdf,.docx,.xlsx,.csv,.txt" multiple capture="environment" onchange="queueFiles(this.files)" />
      
      <div class="queued-files" id="queuedFiles"></div>
    </div>
  </div>

  <script>
    function showCapture() {
      document.getElementById('captureArea').classList.add('active');
    }

    async function queueFiles(files) {
      for (const file of files) {
        await storeForSync(file);
        addToUI(file.name);
      }
    }

    function addToUI(name) {
      const container = document.getElementById('queuedFiles');
      const div = document.createElement('div');
      div.className = 'queued-file';
      div.innerHTML = `<span>📄 ${name}</span><span class="status">⏳ Queued</span>`;
      container.appendChild(div);
    }

    async function storeForSync(file) {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('taxccount-uploads', 1);
        request.onupgradeneeded = () => {
          request.result.createObjectStore('pending-uploads', { keyPath: 'id', autoIncrement: true });
        };
        request.onsuccess = () => {
          const db = request.result;
          const tx = db.transaction('pending-uploads', 'readwrite');
          tx.objectStore('pending-uploads').add({
            file: file,
            client_id: localStorage.getItem('active_client_id') || '',
            document_category: 'client_supporting',
            queued_at: new Date().toISOString(),
          });
          tx.oncomplete = () => {
            // Request background sync
            if ('serviceWorker' in navigator && 'SyncManager' in window) {
              navigator.serviceWorker.ready.then((reg) => {
                reg.sync.register('document-upload-sync');
              });
            }
            resolve();
          };
          tx.onerror = () => reject(tx.error);
        };
        request.onerror = () => reject(request.error);
      });
    }

    // Listen for sync completion messages from SW
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data.type === 'UPLOAD_SYNCED') {
          const items = document.querySelectorAll('.queued-file');
          items.forEach((item) => {
            if (item.textContent.includes(event.data.fileName)) {
              item.querySelector('.status').textContent = '✅ Synced';
              item.querySelector('.status').style.color = '#34d399';
            }
          });
        }
      });
    }
  </script>
</body>
</html>
